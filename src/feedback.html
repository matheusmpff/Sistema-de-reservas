<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="conteudo">
    <div><a href="https://pousadaybitu.com.br/"><img id="logo" class="logo" alt="Logo"></a></div>
    <h1>FEEDBACK</h1>
    <div class="secao">
      <div class="esquerda">
        <p>Conte para nós como foi passar esse tempo conosco!Seu comentário é muito importante para que possamos
          aprimorar ainda mais nossos serviços.!</p>
        <p>Agradecemos pela confiança durante sua estadia conosco, volte sempre!!</p>
      </div>
      <div class="direita">
        <h2> Deixe sua avaliação</h2>
        <form action="">
          <div class="form-part">
            <div class="left">
              <label for="name">Nome:</label><br>
              <input type="text" id="name" placeholder="Insira seu nome"><br>
              <label for="email">E-mail:</label><br>
              <input type="email" id="email" placeholder="Insira seu e-mail"> <br>
              <label for="comentario">Comentário:</label><br>
              <textarea id="comentario" placeholder="Insira seu comentario" rows="6"></textarea>
            </div>
            <div class="right">
              <label class="botao-imagem">
                Insira suas imagens!
                <input type="file" id="foto" accept="image/*" multiple hidden>
              </label>
              <div id="previa">
              </div>
            </div>
          </div>

          <button class="envio">Enviar Comentário</button>
        </form>

      </div>
    </div>
  </div>

  <footer>
    <img id="footer-image" class="img-fluid" alt="">
  </footer>


  <script src="script.js"></script>
</body>

</html>
